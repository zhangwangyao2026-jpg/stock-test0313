name: 短線強勢監控(VSA)

on:
  schedule:
    # 調整說明：設定為 UTC 00:30 (台灣時間 08:30)
    # 提早 30 分鐘啟動，以對抗 GitHub Actions 的幽靈延遲
    - cron: '30 0 * * 1-5'
  workflow_dispatch: # 保留手動觸發按鈕，隨時可以手動叫醒機器人

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝必要套件
        run: |
          pip install pandas fugle-marketdata requests

      - name: 執行監控程式
        env:
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fugle_test.py